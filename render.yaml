services:
  - type: web
    name: dylibscope-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: >-
      pip install -e ".[api]"
    startCommand: >-
      uvicorn dylibscope.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: DYLIBSCOPE_CORS_ORIGINS
        sync: false
